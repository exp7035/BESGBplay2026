<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <title>Play Video Website</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <header class="header">

  <main class="container">

    <section class="card">
      <h2>Act 1</h2>
      <div class="video-wrapper">
        <iframe 
          src="https://www.youtube.com/embed/Fz_ZgNnlXZ4"
          frameborder="0"
          allowfullscreen>
        </iframe>
      </div>
    </section>

    <section class="card">
      <h2>Act 2</h2>
      <div class="video-wrapper">
        <iframe 
          src="https://www.youtube.com/embed/o1FeJrXwtkE"
          frameborder="0"
          allowfullscreen>
        </iframe>
      </div>
    </section>
<section class="card">
  <h2>End Credits</h2>
  <div class="video-wrapper">
    <iframe
      src="https://www.youtube.com/embed/Nor8zuXySX4"
      frameborder="0"
      allowfullscreen>
    </iframe>
  </div>
</section>
  </main>
<footer class="footer">

  <div class="notice">
    <h3>Privacy Notice</h3>
    <p>
      The videos on this website are not public on Youtube and only accessible through the links
    </p>
  </div>
</footer>

  <script src="script.js"></script>
</body>
</html>
